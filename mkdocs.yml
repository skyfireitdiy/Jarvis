site_name: Jarvis Documentation
site_description: AI-powered coding assistant with multi-agent architecture
site_author: Jarvis Team
site_url: https://skyfireitdiy.github.io/Jarvis/

docs_dir: docs/用户手册
exclude_docs: |
  _*.md
  */_*.md

# Repository
definition:
  github:
    repo_url: https://github.com/skyfireitdiy/Jarvis
    edit_uri: edit/main/docs/

# Theme configuration
theme:
  name: dracula
  language: zh

# Plugins
plugins:
  - search:
      lang:
        - en
        - zh
  - git-revision-date-localized:
      enable_creation_date: true

# Markdown extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Extra configuration
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/skyfireitdiy/Jarvis
      name: GitHub
  version:
    provider: automatic
